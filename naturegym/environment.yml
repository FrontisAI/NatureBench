# NatureGym construction environment.
#
# This environment runs the construction pipeline (the batch drivers under
# scripts/ and the skill scripts under .claude/skills/). It is SEPARATE from the
# evaluation environments (`naturebench` / `naturebench-eval`) in the repo root.
#
#   conda env create -f naturegym/environment.yml
#   conda activate naturegym
#
# Note: docker/Dockerfile-side verification (docker_env_verify.py) runs INSIDE
# each task image during stage 5 and does not use this environment.
name: naturegym
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cpu
      # --- required by the pipeline scripts ---
      - pymupdf          # `fitz`: PDF figure/table extraction (paper-preprocess)
      - beautifulsoup4   # HTML -> Markdown and link extraction (paper-preprocess)
      - requests         # link validation and size estimation (paper-filter)
      - urllib3
      # --- data inspection (data-check / inspect_data.py); imported lazily
      #     per file format, so each is optional but recommended ---
      - numpy
      - pandas
      - h5py
      - pyarrow
      - scipy
      - nibabel
      - tifffile
      - torch==2.6.0+cpu   # CPU build; inspect .pt/.pth tensor files (data-check)
